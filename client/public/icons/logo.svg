<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer glowing nebula blur -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050508" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nebula-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#glow)"/>
  
  <!-- Constellation Connecting Lines -->
  <path d="M 25 35 L 40 50 L 25 65" stroke="url(#nebula-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M 75 35 L 60 50 L 75 65" stroke="url(#nebula-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M 40 50 L 60 50" stroke="url(#nebula-grad)" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  
  <!-- Constellation Star Nodes -->
  <circle cx="25" cy="35" r="3" fill="#ffffff" filter="drop-shadow(0 0 4px #7c3aed)"/>
  <circle cx="40" cy="50" r="4" fill="#ffffff" filter="drop-shadow(0 0 6px #6366f1)"/>
  <circle cx="25" cy="65" r="3" fill="#ffffff" filter="drop-shadow(0 0 4px #7c3aed)"/>
  
  <circle cx="75" cy="35" r="3" fill="#ffffff" filter="drop-shadow(0 0 4px #06b6d4)"/>
  <circle cx="60" cy="50" r="4" fill="#ffffff" filter="drop-shadow(0 0 6px #6366f1)"/>
  <circle cx="75" cy="65" r="3" fill="#ffffff" filter="drop-shadow(0 0 4px #06b6d4)"/>
  
  <!-- Subtle center star -->
  <polygon points="50,42 52,48 58,50 52,52 50,58 48,52 42,50 48,48" fill="#ffffff" opacity="0.9"/>
</svg>
